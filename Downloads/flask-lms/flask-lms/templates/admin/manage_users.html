{% extends "base.html" %}
{% block title %}Manage users{% endblock %}
{% block content %}
<h3>Manage users</h3>
<div class="table-responsive"><table class="table table-hover align-middle">
  <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th class="text-end">Actions</th></tr></thead>
  <tbody>
    {% for u in users %}
      <tr>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td><span class="badge {% if u.is_admin %}bg-danger{% else %}bg-secondary{% endif %}">{{ u.role }}</span></td>
        <td>{{ u.created_at.strftime('%Y-%m-%d') }}</td>
        <td class="text-end">
          <form class="d-inline" method="post" action="{{ url_for('admin.delete_user', user_id=u.id) }}" data-confirm="Delete this user?">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn btn-sm btn-outline-danger" {% if u.id == current_user.id %}disabled{% endif %}><i class="bi bi-trash"></i></button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table></div>
{% endblock %}
